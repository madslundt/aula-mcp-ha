name: "Aula MCP"
description: >
  MCP server for the Danish school platform Aula. Exposes presence,
  calendar, messages, and notifications to Home Assistant's AI assistants
  via the /sse endpoint. Point HA's MCP integration at
  http://homeassistant.local:7878/sse to give your voice assistant
  access to all aula.* tools.
version: "1.1.4"
slug: "aula_mcp"
url: "https://github.com/madslundt/aula-mcp-ha"
arch:
  - aarch64
  - amd64
ports:
  7878/tcp: 7878
ports_description:
  7878/tcp: "MCP server (Streamable HTTP /mcp + legacy SSE /sse)"
options:
  mitid_username: ""
  mitid_identity: 1
  aula_mcp_key: ""
schema:
  mitid_username: "str?"
  mitid_identity: "int?"
  aula_mcp_key: "str?"
map:
  - data:rw
startup: services
boot: auto
init: false
